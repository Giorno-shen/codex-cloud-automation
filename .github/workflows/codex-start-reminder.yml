name: Codex Cloud Start

on:
  schedule:
    # GitHub Actions schedules are best-effort. Check every 5 minutes, then
    # create one Codex task per day after 07:30 Asia/Shanghai.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  start-codex:
    runs-on: ubuntu-latest
    steps:
      - name: Create one Codex cloud task after 07:30 Asia/Shanghai
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          today="$(TZ=Asia/Shanghai date +%F)"
          hour="$(TZ=Asia/Shanghai date +%H)"
          minute="$(TZ=Asia/Shanghai date +%M)"

          if [ "$hour$minute" -lt 0730 ]; then
            echo "Before 07:30 Asia/Shanghai; skipping."
            exit 0
          fi

          existing="$(
            gh issue list \
              --repo "$REPO" \
              --state all \
              --search "\"codex-cloud-start\" in:title created:$today" \
              --json number \
              --jq length
          )"

          if [ "$existing" -gt 0 ]; then
            echo "Codex start issue already exists for $today; skipping."
            exit 0
          fi

          gh issue create \
            --repo "$REPO" \
            --title "codex-cloud-start $today" \
            --assignee "Giorno-shen" \
            --body "@codex Please start a minimal cloud task for this repository. Do not modify files, do not open a pull request, and reply with a short acknowledgement only. Scheduled date: $today."
