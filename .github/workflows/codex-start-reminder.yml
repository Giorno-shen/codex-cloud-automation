name: Codex Start Reminder

on:
  schedule:
    # GitHub Actions schedules use UTC. 23:30 UTC is 07:30 in Asia/Shanghai.
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Create reminder issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "codex 启动" \
            --body "codex 启动"
